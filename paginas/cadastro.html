<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | AG Acessórios</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<main id="geral">

    <!-- ================= CABEÇALHO ================= -->

    <header id="cabecalho">

        <div id="logo">
            <a href="../index.html">
                <img src="../img/logo.png" alt="Logo AG Acessórios">
            </a>
        </div>

        <nav id="menu">
            <ul>
                <li><a href="../index.html" class="lnk_menu">Home</a></li>
                <li><a href="cadastro.html" class="lnk_menu">Cadastro</a></li>
                <li><a href="login.html" class="lnk_menu">Login</a></li>
                <li><a href="sobre.html" class="lnk_menu">Sobre</a></li>
                <li><a href="carrinho.html" class="lnk_menu">Carrinho</a></li>
            </ul>
        </nav>

        <div id="div-icones">
            <ul>
                <li>
                    <a href="login.html" class="lnk_icone">
                        <img src="../img/login.png" alt="Login">
                    </a>
                </li>

                <li>
                    <a href="carrinho.html" class="lnk_icone">
                        <img src="../img/pix.png" alt="Carrinho">
                    </a>
                </li>
            </ul>
        </div>

    </header>

    <!-- ================= FORMULÁRIO ================= -->

    <section id="formulario">

        <h2>Cadastro de Cliente</h2>

        <form id="form-pessoa">

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" class="input01" placeholder="Digite seu nome" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" class="input02" placeholder="000.000.000-00" maxlength="14" required>

            <label for="data-nascimento">Data de Nascimento</label>
            <input type="date" id="data-nascimento" class="input02" required>

            <label>Sexo</label>

            <div class="grupo-radio">

                <label>
                    <input type="radio" name="sexo" value="M">
                    Masculino
                </label>

                <label>
                    <input type="radio" name="sexo" value="F">
                    Feminino
                </label>

                <label>
                    <input type="radio" name="sexo" value="N">
                    Prefiro não informar
                </label>

            </div>

            <label for="cep">CEP</label>
            <input type="text" id="cep" class="input02" placeholder="49000-000">

            <label for="logradouro">Logradouro</label>
            <input type="text" id="logradouro" class="input01">

            <label for="numero">Número</label>
            <input type="text" id="numero" class="input02">

            <label for="complemento">Complemento</label>
            <input type="text" id="complemento" class="input01">

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" class="input01">

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" class="input01">

            <label for="uf">UF</label>
            <input type="text" id="uf" class="input02" maxlength="2">

            <label for="email">E-mail</label>
            <input type="email" id="email" class="input01" placeholder="Digite seu e-mail" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" class="input02" placeholder="Digite sua senha" required>

            <div id="div-btns">

                <button type="submit" id="btn-add">
                    Cadastrar
                </button>

                <button type="reset" id="btn-limpar">
                    Limpar
                </button>

            </div>

        </form>

    </section>

    <!-- ================= RODAPÉ ================= -->

    <footer id="rodape">

        <div id="dadosloja">
            <h2>Rua Sei Lá das Quantas, 1001 - Centro</h2>
            <h3>Aracaju - Sergipe</h3>
        </div>

    </footer>

</main>

</body>
</html>
