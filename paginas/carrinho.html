<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | AG Acessórios</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <main id="geral">

        <!-- ================= CABEÇALHO ================= -->

        <header id="cabecalho">

            <div id="logo">
                <a href="../index.html">
                    <img src="../img/logo.png" alt="Logo AG Acessórios">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu">Home</a></li>
                    <li><a href="cadastro.html" class="lnk_menu">Cadastro</a></li>
                    <li><a href="login.html" class="lnk_menu">Login</a></li>
                    <li><a href="sobre.html" class="lnk_menu">Sobre</a></li>
                    <li><a href="carrinho.html" class="lnk_menu">Carrinho</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>

                    <li>
                        <a href="login.html" class="lnk_icone">
                            <img src="../img/login.png" alt="Login">
                        </a>
                    </li>

                    <li>
                        <a href="carrinho.html" class="lnk_icone">
                            <img src="../img/pix.png" alt="Carrinho">
                        </a>
                    </li>

                </ul>
            </div>

        </header>

        <!-- ================= CARRINHO ================= -->

        <section class="container">

            <h2>Carrinho de Compras</h2>

            <table>

                <thead>

                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Subtotal</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>Presilha Lilás</td>
                        <td>2</td>
                        <td>R$ 20,50</td>
                        <td>R$ 41,00</td>
                    </tr>

                    <tr>
                        <td>Elástico de Cetim</td>
                        <td>3</td>
                        <td>R$ 10,00</td>
                        <td>R$ 30,00</td>
                    </tr>

                    <tr>
                        <td>Prendedor Luxo</td>
                        <td>1</td>
                        <td>R$ 25,90</td>
                        <td>R$ 25,90</td>
                    </tr>

                </tbody>

            </table>

            <div class="total">
                <h3>Total: <strong>R$ 96,90</strong></h3>
            </div>

            <div class="botoes">

                <button onclick="window.location.href='../index.html'">
                    Continuar Comprando
                </button>

                <button>
                    Finalizar Compra
                </button>

            </div>

        </section>

        <!-- ================= RODAPÉ ================= -->

        <footer id="rodape">

            <div id="dadosloja">

                <h2>Rua Sei Lá das Quantas, 1001 - Centro</h2>

                <h3>Aracaju - Sergipe</h3>

            </div>

        </footer>

    </main>

</body>

</html>
